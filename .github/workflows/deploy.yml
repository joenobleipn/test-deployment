name: Deploy to CloudHub 2.0

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Deploy to CloudHub 2.0
        run: |
          mvn deploy -DmuleDeploy -DskipTests \
            -Danypoint.environment=${{ vars.ANYPOINT_ENVIRONMENT }} \
            -Danypoint.target=${{ vars.ANYPOINT_TARGET }} \
            -Danypoint.appName=${{ vars.ANYPOINT_APP_NAME }} \
            -Danypoint.businessGroupId=${{ vars.ANYPOINT_BUSINESS_GROUP_ID }} \
            -Danypoint.client.id=${{ secrets.ANYPOINT_CLIENT_ID }} \
            -Danypoint.client.secret=${{ secrets.ANYPOINT_CLIENT_SECRET }} \
            -Dmule.env=${{ vars.ANYPOINT_MULE_ENV }}
