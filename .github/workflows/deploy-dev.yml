name: Deploy to Dev

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate encryption key
        run: |
          SECURE_KEY=$(openssl rand -hex 16)
          echo "SECURE_KEY=$SECURE_KEY" >> $GITHUB_ENV
          # echo "::add-mask::$SECURE_KEY"  # disabled for testing

      - name: Build secure-properties.yaml from mapping
        run: |
          encrypt() {
            curl -sf --location 'https://secure-properties-api.us-e1.cloudhub.io/api/string' \
              --form 'operation="encrypt"' \
              --form 'algorithm="AES"' \
              --form 'mode="CBC"' \
              --form "key=\"$SECURE_KEY\"" \
              --form "value=\"$1\"" \
              --form 'method="string"' | jq -r '.property'
          }

          MAPPING="src/main/resources/properties/properties.mapping.yaml"
          OUTPUT="src/main/resources/properties/secure-properties.yaml"
          cp "$MAPPING" "$OUTPUT"

          grep -oP '\{\{\s*(secrets|vars)\.\K[A-Z_]+' "$MAPPING" | sort -u | while read -r KEY; do
            VALUE="${!KEY}"
            if [ -z "$VALUE" ]; then
              echo "::warning::No value found for $KEY"
              continue
            fi
            ENCRYPTED=$(encrypt "$VALUE")
            sed -i "s|{{ secrets\.$KEY }}|![${ENCRYPTED}]|g" "$OUTPUT"
            sed -i "s|{{ vars\.$KEY }}|![${ENCRYPTED}]|g" "$OUTPUT"
          done

          echo "=== Encryption Key ==="
          echo "$SECURE_KEY"
          echo "=== Generated secure-properties.yaml ==="
          cat "$OUTPUT"
          echo "========================================="
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Upload secure-properties.yaml as artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-properties
          path: src/main/resources/properties/secure-properties.yaml
