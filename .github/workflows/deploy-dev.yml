name: Deploy to Dev

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate encryption key
        run: |
          SECURE_KEY=$(openssl rand -hex 16)
          echo "SECURE_KEY=$SECURE_KEY" >> $GITHUB_ENV
          # echo "::add-mask::$SECURE_KEY"  # disabled for testing

      - name: Build secure-properties.yaml from mapping
        run: |
          encrypt() {
            curl -sf --location 'https://secure-properties-api.us-e1.cloudhub.io/api/string' \
              --form 'operation="encrypt"' \
              --form 'algorithm="AES"' \
              --form 'mode="CBC"' \
              --form "key=\"$SECURE_KEY\"" \
              --form "value=\"$1\"" \
              --form 'method="string"' | jq -r '.property'
          }

          MAPPING="src/main/resources/properties/properties.mapping.yaml"
          OUTPUT="src/main/resources/properties/secure-properties.yaml"
          cp "$MAPPING" "$OUTPUT"

          LOOKUP=$(echo "$ALL_SECRETS" "$ALL_VARS" | jq -s 'add')
          MISSING=()

          grep -oP '\{\{\s*(secrets|vars)\.(\K[A-Z_0-9]+)' "$MAPPING" | sort -u | while read -r KEY; do
            VALUE=$(echo "$LOOKUP" | jq -r --arg k "$KEY" '.[$k] // empty')
            if [ -z "$VALUE" ]; then
              echo "::error::Missing GitHub secret or variable: $KEY (referenced in properties.mapping.yaml but not found in this environment)"
              echo "$KEY" >> /tmp/missing_keys
              continue
            fi
            ENCRYPTED=$(encrypt "$VALUE")
            sed -i "s|{{ secrets\.$KEY }}|![${ENCRYPTED}]|g" "$OUTPUT"
            sed -i "s|{{ vars\.$KEY }}|![${ENCRYPTED}]|g" "$OUTPUT"
          done

          if [ -f /tmp/missing_keys ]; then
            echo ""
            echo "========================================="
            echo "FAILED: The following secrets/variables are referenced in"
            echo "properties.mapping.yaml but do not exist in this GitHub environment:"
            echo ""
            cat /tmp/missing_keys | sed 's/^/  - /'
            echo ""
            echo "Add them in: GitHub repo → Settings → Environments → $(echo $GITHUB_ENVIRONMENT) → Secrets/Variables"
            echo "========================================="
            exit 1
          fi

          echo "$SECURE_KEY" > secure-key.txt
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}

      - name: Upload secure-properties.yaml as artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-properties
          path: |
            src/main/resources/properties/secure-properties.yaml
            secure-key.txt
