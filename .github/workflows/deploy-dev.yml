name: Deploy to Dev

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Generate encryption key
        run: |
          SECURE_KEY=$(openssl rand -hex 16)
          echo "SECURE_KEY=$SECURE_KEY" >> $GITHUB_ENV
          echo "::add-mask::$SECURE_KEY"

      - name: Build secure-properties.yaml from mapping
        run: |
          encrypt() {
            curl -sf --location 'https://secure-properties-api.us-e1.cloudhub.io/api/string' \
              --form 'operation="encrypt"' \
              --form 'algorithm="AES"' \
              --form 'mode="CBC"' \
              --form "key=\"$SECURE_KEY\"" \
              --form "value=\"$1\"" \
              --form 'method="string"' | jq -r '.property'
          }

          MAPPING="src/main/resources/properties/properties.mapping.yaml"
          OUTPUT="src/main/resources/properties/secure-properties.yaml"
          cp "$MAPPING" "$OUTPUT"

          LOOKUP=$(echo "$ALL_SECRETS" "$ALL_VARS" | jq -s 'add')

          grep -oP '\{\{\s*(secrets|vars)\.(\K[A-Z_0-9]+)' "$MAPPING" | sort -u | while read -r KEY; do
            VALUE=$(echo "$LOOKUP" | jq -r --arg k "$KEY" '.[$k] // empty')
            if [ -z "$VALUE" ]; then
              echo "::error::Missing GitHub secret or variable: $KEY (referenced in properties.mapping.yaml but not found in this environment)"
              echo "$KEY" >> /tmp/missing_keys
              continue
            fi
            ENCRYPTED=$(encrypt "$VALUE")
            sed -i "s|{{ secrets\.$KEY }}|![${ENCRYPTED}]|g" "$OUTPUT"
            sed -i "s|{{ vars\.$KEY }}|![${ENCRYPTED}]|g" "$OUTPUT"
          done

          if [ -f /tmp/missing_keys ]; then
            echo ""
            echo "========================================="
            echo "FAILED: The following secrets/variables are referenced in"
            echo "properties.mapping.yaml but do not exist in this GitHub environment:"
            echo ""
            cat /tmp/missing_keys | sed 's/^/  - /'
            echo ""
            echo "Add them in: GitHub repo → Settings → Environments → $(echo $GITHUB_ENVIRONMENT) → Secrets/Variables"
            echo "========================================="
            exit 1
          fi
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}

      - name: Configure Maven settings
        run: |
          sed -i "s|ANYPOINT_CLIENT_ID_PLACEHOLDER|${{ secrets.ANYPOINT_CLIENT_ID }}|g" .maven/settings.xml
          sed -i "s|ANYPOINT_CLIENT_SECRET_PLACEHOLDER|${{ secrets.ANYPOINT_CLIENT_SECRET }}|g" .maven/settings.xml
          sed -i "s|ANYPOINT_ORG_ID_PLACEHOLDER|${{ vars.ANYPOINT_BUSINESS_GROUP_ID }}|g" .maven/settings.xml

      - name: Build
        run: mvn clean package -DskipTests -s .maven/settings.xml

      - name: Deploy to CloudHub 2.0
        run: |
          mvn deploy -DmuleDeploy -DskipTests -s .maven/settings.xml \
            -Danypoint.environment=${{ vars.ANYPOINT_ENVIRONMENT }} \
            -Danypoint.target=${{ vars.ANYPOINT_TARGET }} \
            -Danypoint.appName=${{ vars.ANYPOINT_APP_NAME }} \
            -Danypoint.client.id=${{ secrets.ANYPOINT_CLIENT_ID }} \
            -Danypoint.client.secret=${{ secrets.ANYPOINT_CLIENT_SECRET }} \
            -DmuleVersion=4.11.4:4e \
            -Dsecure.key=$SECURE_KEY
